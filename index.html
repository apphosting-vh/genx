<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111318" />
    <meta name="description" content="GenFin - Generator Sales & Service Business Management" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>GenFin - Business Manager</title>

    <!-- Manifest for PWA -->
    <link rel="manifest" href="./manifest.json" />

    <!-- SheetJS for Excel import/export -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" crossorigin="anonymous">
    </script>

    <!-- Chart.js with crossOrigin for caching -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" crossorigin="anonymous">
    </script>

    <!-- Google Identity Services & API Client for Drive Backup (NOT cached) -->
    <script src="https://accounts.google.com/gsi/client">
    </script>
    <script src="https://apis.google.com/js/api.js">
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        /* ── Root ──────────────────────────────────────────────────────── */
        :root {
            --primary: #5b5ef6;
            --primary-hover: #4a4de4;
            --primary-muted: rgba(91, 94, 246, 0.12);

            --logo-bg: #f97316;
            --logo-bg-hover: #ea670c;

            --sidebar-bg: #0c1e3d;
            --sidebar-bg-gradient: linear-gradient(180deg, #0e2347 0%, #0a1830 100%);
            --sidebar-border: rgba(255, 255, 255, 0.08);
            --sidebar-text: rgba(255, 255, 255, 0.72);
            --sidebar-text-hover: #ffffff;
            --sidebar-active-bg: rgba(59, 130, 246, 0.22);
            --sidebar-active-text: #fff;
            --sidebar-hover-bg: rgba(96, 165, 250, 0.12);
            --sidebar-label: rgba(255, 255, 255, 0.42);
            --sidebar-accent: #3b82f6;

            --bg: #f4f6fb;
            --card: #ffffff;
            --text: #0f172a;
            --text-secondary: #64748b;
            --border: #e8edf5;
            --border-strong: #d1d9e6;

            --success: #10b981;
            --success-bg: #ecfdf5;
            --success-text: #065f46;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --danger-text: #991b1b;
            --warning: #f59e0b;
            --warning-bg: #fffbeb;
            --warning-text: #92400e;

            --shadow-xs: 0 1px 2px rgba(15, 23, 42, 0.04);
            --shadow-sm: 0 1px 4px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.04);
            --shadow: 0 4px 12px rgba(15, 23, 42, 0.08), 0 1px 3px rgba(15, 23, 42, 0.05);
            --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.12), 0 4px 8px rgba(15, 23, 42, 0.06);

            --radius: 10px;
            --radius-sm: 7px;
            --radius-xs: 5px;
            --transition: 0.18s ease;
        }

        /* ── Ocean Theme (Deep Blue) ──────────────────────────────────────── */
        [data-theme="ocean"] {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-muted: rgba(37, 99, 235, 0.12);

            --logo-bg: #1d4ed8;
            --logo-bg-hover: #1e40af;

            --sidebar-bg: #0a1a38;
            --sidebar-bg-gradient: linear-gradient(180deg, #0d1f42 0%, #071430 100%);
            --sidebar-border: rgba(255,255,255,0.08);
            --sidebar-text: rgba(255,255,255,0.72);
            --sidebar-text-hover: #fff;
            --sidebar-active-bg: rgba(37,99,235,0.25);
            --sidebar-active-text: #fff;
            --sidebar-hover-bg: rgba(96,165,250,0.12);
            --sidebar-label: rgba(255,255,255,0.42);
            --sidebar-accent: #3b82f6;

            --bg: #eef2ff;
            --card: #fff;
            --text: #0f172a;
            --text-secondary: #64748b;
            --border: #dbe6f5;
            --border-strong: #c4d4e8;
        }

        /* ── Azure Theme (Sky Blue) ──────────────────────────────────────── */
        [data-theme="azure"] {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --primary-muted: rgba(14,165,233,0.12);

            --logo-bg: #0284c7;
            --logo-bg-hover: #0369a1;

            --sidebar-bg: #0c3550;
            --sidebar-bg-gradient: linear-gradient(180deg, #0f3d5e 0%, #082a40 100%);
            --sidebar-border: rgba(255,255,255,0.08);
            --sidebar-text: rgba(255,255,255,0.72);
            --sidebar-text-hover: #fff;
            --sidebar-active-bg: rgba(14,165,233,0.22);
            --sidebar-active-text: #fff;
            --sidebar-hover-bg: rgba(56,189,248,0.12);
            --sidebar-label: rgba(255,255,255,0.42);
            --sidebar-accent: #38bdf8;

            --bg: #f0f9ff;
            --card: #fff;
            --text: #0f172a;
            --text-secondary: #64748b;
            --border: #e0f2fe;
            --border-strong: #bae6fd;
        }

        /* ── Sapphire Theme (Indigo) ─────────────────────────────────────── */
        [data-theme="sapphire"] {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-muted: rgba(99,102,241,0.12);

            --logo-bg: #4f46e5;
            --logo-bg-hover: #4338ca;

            --sidebar-bg: #1a1740;
            --sidebar-bg-gradient: linear-gradient(180deg, #1f1b4d 0%, #13102e 100%);
            --sidebar-border: rgba(255,255,255,0.08);
            --sidebar-text: rgba(255,255,255,0.72);
            --sidebar-text-hover: #fff;
            --sidebar-active-bg: rgba(99,102,241,0.25);
            --sidebar-active-text: #fff;
            --sidebar-hover-bg: rgba(129,140,248,0.12);
            --sidebar-label: rgba(255,255,255,0.42);
            --sidebar-accent: #818cf8;

            --bg: #eef2ff;
            --card: #fff;
            --text: #0f172a;
            --text-secondary: #64748b;
            --border: #e3e6f5;
            --border-strong: #c8cde8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ── Sidebar ── COMPACT VERSION ────────────────────────────────── */
        .sidebar {
            width: 232px;
            background: var(--sidebar-bg-gradient);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition);
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .sidebar-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--sidebar-border);
            margin-bottom: 2px;
            flex-shrink: 0;
        }
        .sidebar-header .logo {
            font-size: 1.05rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
        }
        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--logo-bg);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(249, 115, 22, 0.4);
        }
        .logo-icon svg {
            width: 15px;
            height: 15px;
            color: #fff;
        }
        .sidebar-header .subtitle {
            font-size: 0.6rem;
            color: var(--sidebar-label);
            letter-spacing: 0.5px;
            margin-top: 1px;
            margin-left: 36px;
            font-weight: 500;
        }

        .nav-section {
            padding: 0;
        }
        .nav-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
            color: var(--sidebar-label);
            padding: 10px 16px 3px 18px;
        }

        /* ── Nav item base ── more compact ────────────────────────────── */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px 6px 18px;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.78rem;
            color: var(--sidebar-text);
            user-select: none;
            font-weight: 500;
            position: relative;
            margin: 1px 8px 1px 0;
            border-radius: 0 6px 6px 0;
            letter-spacing: -0.1px;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            border-radius: 0 3px 3px 0;
            background: var(--sidebar-accent);
            transition: height var(--transition), background var(--transition);
        }
        .nav-item svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
            opacity: 0.6;
            transition: opacity var(--transition);
        }
        .nav-item:hover {
            background: var(--sidebar-hover-bg);
            color: var(--sidebar-text-hover);
        }
        .nav-item:hover svg {
            opacity: 0.9;
        }
        .nav-item:hover::before {
            height: 55%;
        }

        .nav-item.active {
            color: #fff;
            font-weight: 600;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
        }
        .nav-item.active svg {
            opacity: 1;
        }
        .nav-item.active::before {
            height: 65%;
            background: #fff !important;
        }

        /* ── Sidebar footer ── compact ────────────────────────────────── */
        .sidebar-footer {
            margin-top: auto;
            padding: 10px 16px;
            border-top: 1px solid var(--sidebar-border);
            font-size: 0.65rem;
            color: var(--sidebar-label);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            flex-shrink: 0;
        }
        .status-dot.offline {
            background: #ef4444;
        }

        /* ── Main content ─────────────────────────────────────────────── */
        .main-content {
            flex: 1;
            margin-left: 232px;
            padding: 24px 30px;
            min-height: 100vh;
            transition: margin var(--transition);
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.4px;
        }

        /* ── Buttons ───────────────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            transition: all var(--transition);
            white-space: nowrap;
            background: #ffffff;
            border: 1px solid var(--border-strong);
            color: #374151;
            font-family: inherit;
            letter-spacing: -0.1px;
        }
        .btn:hover {
            box-shadow: var(--shadow-sm);
            border-color: #c2cfe0;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: transparent;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 14px rgba(91, 94, 246, 0.35);
            border-color: transparent;
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #374151;
            border-color: #e2e8f0;
        }
        .btn-secondary:hover {
            background: #e8eef7;
        }
        .btn-export {
            background: linear-gradient(135deg, #059669, #047857);
            color: #fff;
            border-color: transparent;
        }
        .btn-export:hover {
            background: linear-gradient(135deg, #047857, #065f46);
            box-shadow: 0 4px 14px rgba(5, 150, 105, 0.35);
            border-color: transparent;
        }
        .theme-option:hover {
            border-color: var(--sidebar-accent) !important;
        }
        .theme-option input:checked + span + span + span {
            color: var(--primary);
        }
        .btn-danger {
            background: var(--danger-bg);
            color: var(--danger-text);
            border-color: #fecaca;
        }
        .btn-danger:hover {
            background: #fee2e2;
        }
        .btn-success {
            background: var(--success-bg);
            color: var(--success-text);
            border-color: #a7f3d0;
        }
        .btn-warning {
            background: var(--warning-bg);
            color: var(--warning-text);
            border-color: #fde68a;
        }
        .btn-yellow {
            background: #fbbf24;
            color: #1e293b;
            border-color: #f59e0b;
        }
        .btn-yellow:hover {
            background: #f59e0b;
            border-color: #d97706;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.4);
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 0.7rem;
            border-radius: var(--radius-xs);
        }
        .btn-xs {
            padding: 3px 7px;
            font-size: 0.65rem;
            border-radius: 4px;
        }

        /* ── Cards ─────────────────────────────────────────────────────── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-xs);
            border: 1px solid var(--border);
            padding: 18px 20px;
            margin-bottom: 16px;
        }
        .stat-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }
        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-xs);
            border: 1px solid var(--border);
            padding: 14px 16px;
            transition: box-shadow var(--transition), transform var(--transition);
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
            letter-spacing: -1px;
        }
        .stat-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            font-weight: 600;
        }

        /* ── Tables ────────────────────────────────────────────────────── */
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        th {
            padding: 9px 12px;
            text-align: left;
            font-weight: 600;
            color: #fff;
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: none;
            white-space: nowrap;
        }
        td {
            padding: 9px 12px;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text);
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: #f8faff;
        }

        /* ── Badges ────────────────────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .badge-paid {
            background: var(--success-bg);
            color: var(--success-text);
        }
        .badge-pending {
            background: var(--warning-bg);
            color: var(--warning-text);
        }
        .badge-overdue {
            background: var(--danger-bg);
            color: var(--danger-text);
        }

        /* ── Modals ────────────────────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal {
            background: #fff;
            border-radius: 14px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 760px;
            max-height: 88vh;
            overflow-y: auto;
            padding: 24px 28px;
            position: relative;
            border: 1px solid var(--border);
        }
        .modal h3 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }
        .modal-close {
            position: absolute;
            top: 14px;
            right: 16px;
            background: #1e293b;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #f8fafc;
            padding: 4px 8px;
            border-radius: var(--radius-xs);
            line-height: 1;
            transition: all var(--transition);
        }
        .modal-close:hover {
            background: #0f172a;
            color: #fff;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.3);
        }
        .btn-dark {
            background: #1e293b;
            color: #f8fafc;
            border-color: transparent;
        }
        .btn-dark:hover {
            background: #0f172a;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.35);
            border-color: transparent;
        }

        /* ── Forms ─────────────────────────────────────────────────────── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-grid.span-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-group.full {
            grid-column: 1 / -1;
        }
        .form-group label {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 8px 10px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-family: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
            background: #fff;
            color: var(--text);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(91, 94, 246, 0.12);
        }

        /* ── Toasts ────────────────────────────────────────────────────── */
        .toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 10px 14px;
            border-radius: 9px;
            color: #fff;
            font-weight: 600;
            font-size: 0.78rem;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 340px;
        }
        .toast-success {
            background: #059669;
        }
        .toast-error {
            background: #dc2626;
        }
        .toast-info {
            background: var(--primary);
        }
        .toast-warning {
            background: #d97706;
        }
        @keyframes slideIn {
            from {
                transform: translateX(110%) scale(0.92);
                opacity: 0;
            }
            to {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }

        /* ── Mobile toggle ────────────────────────────────────────────── */
        .menu-toggle {
            display: none;
            background: var(--sidebar-bg);
            color: #fff;
            border: none;
            font-size: 1.1rem;
            padding: 8px 10px;
            border-radius: 7px;
            cursor: pointer;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 300;
            box-shadow: var(--shadow);
        }

        /* ── Misc ──────────────────────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 36px 20px;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .chart-container {
            margin: 14px 0;
            max-height: 300px;
        }

        /* ── Responsive ────────────────────────────────────────────────── */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 260px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 16px 12px;
                padding-top: 52px;
            }
            .menu-toggle {
                display: block;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-grid.span-3 {
                grid-template-columns: 1fr;
            }
            .stat-row {
                grid-template-columns: 1fr 1fr;
            }
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .modal {
                max-width: 95vw;
                padding: 16px 18px;
            }
        }

        /* ── Print ─────────────────────────────────────────────────────── */
        @media print {
            body {
                background: #fff;
            }
            .sidebar,
            .menu-toggle,
            .page-header button,
            .btn,
            .modal-overlay,
            .toast-container,
            .nav-section,
            .sidebar-footer,
            .no-print {
                display: none !important;
            }
            .main-content {
                margin-left: 0 !important;
                padding: 0 !important;
            }
            .card {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }
            table {
                font-size: 0.7rem;
            }
            @page {
                margin: 0.5cm;
                size: A4;
            }
        }
        .print-area {
            display: none;
        }
        @media print {
            .print-area {
                display: block;
            }
        }

        .table-wrap th {
            transition: background 0.25s ease, color 0.25s ease;
        }

        .filter-row .filter-cell {
            padding: 4px 6px;
            border-bottom: 2px solid var(--border-strong);
        }
        .table-filter-input {
            width: 100%;
            padding: 3px 6px;
            font-size: 0.7rem;
            border: 1px solid var(--border-strong);
            border-radius: 4px;
            background: var(--card);
            color: var(--text);
            outline: none;
            box-sizing: border-box;
            min-width: 40px;
            cursor: pointer;
        }
        .table-filter-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-muted);
        }
        .table-filter-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .filter-clear-btn {
            display: none;
            font-size: 0.65rem;
            padding: 2px 8px;
            margin-left: 6px;
            border: 1px solid var(--border-strong);
            border-radius: 4px;
            background: var(--card);
            color: var(--text-secondary);
            cursor: pointer;
        }
        .filter-clear-btn:hover {
            background: var(--bg);
            color: var(--text);
        }
        .filter-row.has-filters .filter-clear-btn {
            display: inline-block;
        }
        .no-results-row td {
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* ── Note card styles ─────────────────────────────────────────── */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 14px;
        }
        .note-card {
            background: #fff;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            padding: 14px 16px;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow-xs);

        .note-card:hover {
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }
        .note-card-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .note-card-preview {
            font-size: 0.78rem;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .note-card-date {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }
        .note-editor {
            margin-top: 16px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }

        /* ── Status badges for inventory ─────────────────────────────── */
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .status-in-stock {
            background: #d1fae5;
            color: #065f46;
        }
        .status-low-stock {
            background: #fef3c7;
            color: #92400e;
        }
        .status-out-of-stock {
            background: #fee2e2;
            color: #991b1b;
        }
        .status-discontinued {
            background: #e5e7eb;
            color: #4b5563;
        }

        /* ── Filter bar ────────────────────────────────────────────────── */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .filter-bar .form-group {
            margin-bottom: 0;
        }

        /* ── Real-time sync indicator in sidebar ──────────────────────── */
        #syncIndicator {
            margin-left: auto;
            cursor: default;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
        }
        #syncIndicator .icon {
            width: 16px;
            height: 16px;
        }

        /* ── Multi-select dropdown ─────────────────────────────────────── */
        .multi-select {
            position: relative;
            width: 100%;
            font-size: 0.82rem;
        }
        .multi-select-trigger {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 6px 8px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            cursor: pointer;
            min-height: 38px;
            background: #fff;
            align-items: center;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .multi-select-trigger:hover,
        .multi-select-trigger.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(91,94,246,0.12);
        }
        .multi-select-tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: var(--primary-muted);
            color: var(--primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 500;
            line-height: 1.4;
        }
        .multi-select-tag-remove {
            cursor: pointer;
            font-weight: 700;
            opacity: 0.6;
            font-size: 0.85rem;
            line-height: 1;
            margin-left: 2px;
        }
        .multi-select-tag-remove:hover {
            opacity: 1;
        }
        .multi-select-search {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            padding: 2px 4px !important;
            flex: 1;
            min-width: 80px;
            font-size: 0.82rem;
            background: transparent;
            font-family: inherit;
        }
        .multi-select-arrow {
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-left: auto;
            padding: 0 4px;
        }
        .multi-select-dropdown {
            position: fixed;
            z-index: 250;
            background: #fff;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow);
            max-height: 260px;
            overflow-y: auto;
            display: none;
        }
        .multi-select-dropdown.open {
            display: block;
        }
        .multi-select-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            cursor: pointer;
            font-size: 0.82rem;
            transition: background 0.1s;
        }
        .multi-select-option:hover {
            background: var(--bg);
        }
        .multi-select-option input[type="checkbox"] {
            margin: 0;

        }
        .multi-select-option-label {

        }
        .multi-select-option-stock {
            font-size: 0.7rem;

        }
        .multi-select-no-results {
            padding: 12px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.78rem;
        }
    </style>

    <!-- ─── Page Color System ───────────────────────────────────────────── -->
    <script>
        (function() {
            'use strict';

            // ── Color palette for each page ──────────────────────────────
            const PAGE_COLORS = {
                'invoices': {
                    primary: '#10B981',
                    dark: '#059669',
                    light: 'rgba(16,185,129,0.22)'
                },
                'purchase-orders': {
                    primary: '#F59E0B',
                    dark: '#D97706',
                    light: 'rgba(245,158,11,0.22)'
                },
                'expenses': {
                    primary: '#EF4444',
                    dark: '#DC2626',
                    light: 'rgba(239,68,68,0.22)'
                },
                'customers': {
                    primary: '#8B5CF6',
                    dark: '#7C3AED',
                    light: 'rgba(139,92,246,0.22)'
                },
                'suppliers': {
                    primary: '#14B8A6',
                    dark: '#0D9488',
                    light: 'rgba(20,184,166,0.22)'
                },
                'products': {
                    primary: '#6366F1',
                    dark: '#4F46E5',
                    light: 'rgba(99,102,241,0.22)'
                },
                'service-warranty': {
                    primary: '#EC4899',
                    dark: '#DB2777',
                    light: 'rgba(236,72,153,0.22)'
                },
                'reports': {
                    primary: '#06B6D4',
                    dark: '#0891B2',
                    light: 'rgba(6,182,212,0.22)'
                },
                'profile': {
                    primary: '#F59E0B',
                    dark: '#D97706',
                    light: 'rgba(245,158,11,0.22)'
                },
                'settings': {
                    primary: '#64748B',
                    dark: '#475569',
                    light: 'rgba(100,116,139,0.22)'
                },
                'gst-summary': {
                    primary: '#8B5CF6',
                    dark: '#7C3AED',
                    light: 'rgba(139,92,246,0.22)'
                },
                'notepad': {
                    primary: '#F59E0B',
                    dark: '#D97706',
                    light: 'rgba(245,158,11,0.22)'
                }
            };

            // ── DOM refs ──────────────────────────────────────────────────
            const navItems = document.querySelectorAll('.nav-item');
            const mainContent = document.getElementById('mainContent');

            // ── Apply page colors ────────────────────────────────────────
            function applyPageColors(page) {
                const colors = PAGE_COLORS[page];
                if (!colors) return;

                navItems.forEach(el => {
                    el.classList.remove('active');
                    el.style.background = 'transparent';
                });

                const activeNav = document.querySelector(`.nav-item[data-page="${page}"]`);
                if (activeNav) {
                    activeNav.classList.add('active');
                    activeNav.style.background = colors.light;
                    activeNav.style.boxShadow = `inset 0 0 0 1px ${colors.primary}40, 0 0 20px ${colors.primary}15`;
                }

                const allTh = mainContent.querySelectorAll('.table-wrap th');
                allTh.forEach(th => {
                    th.style.background = colors.dark;
                    th.style.color = '#fff';
                    th.style.borderBottom = 'none';
                });

                const theadTh = mainContent.querySelectorAll('thead th');
                theadTh.forEach(th => {
                    th.style.background = colors.dark;
                    th.style.color = '#fff';
                    th.style.borderBottom = 'none';
                });

                mainContent.dataset.activePage = page;
            }

            // ── Nav click handler ────────────────────────────────────────
            navItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    const page = this.dataset.page;
                    if (!page) return;
                    requestAnimationFrame(() => {
                        setTimeout(() => {
                            applyPageColors(page);
                        }, 20);
                    });
                });
            });

            // ── MutationObserver: re-apply colors when content changes ──
            const observer = new MutationObserver(() => {
                const currentPage = mainContent.dataset.activePage || 'invoices';
                if (currentPage && PAGE_COLORS[currentPage]) {
                    applyPageColors(currentPage);
                } else {
                    const active = document.querySelector('.nav-item.active');
                    if (active) {
                        const page = active.dataset.page;
                        if (page && PAGE_COLORS[page]) {
                            applyPageColors(page);
                        }
                    }
                }
            });

            observer.observe(mainContent, {
                childList: true,
                subtree: true,
                attributes: false,
            });

            // ── Also watch for table addition ─────────────────────────────
            const tableObserver = new MutationObserver(() => {
                const currentPage = mainContent.dataset.activePage || 'invoices';
                if (currentPage && PAGE_COLORS[currentPage]) {
                    const ths = mainContent.querySelectorAll('.table-wrap th, thead th');
                    if (ths.length > 0) {
                        const colors = PAGE_COLORS[currentPage];
                        ths.forEach(th => {
                            th.style.background = colors.dark;
                            th.style.color = '#fff';
                            th.style.borderBottom = 'none';
                        });
                    }
                }
            });

            tableObserver.observe(mainContent, {
                childList: true,
                subtree: true,
                attributes: false,
            });

            // ── Initial load: apply colors for the active page ──────────
            function initColors() {
                const active = document.querySelector('.nav-item.active');
                if (active) {
                    const page = active.dataset.page;
                    if (page && PAGE_COLORS[page]) {
                        applyPageColors(page);
                        return;
                    }
                }
                applyPageColors('invoices');
            }

            if (document.readyState === 'complete') {
                initColors();
            } else {
                window.addEventListener('load', () => {
                    setTimeout(initColors, 150);
                });
            }

            // ── Expose so app-core.js can call us ────────────────────────
            window.__applyPageColors = applyPageColors;

            // ── Listen for pageChange events ─────────────────────────────
            document.addEventListener('pageChange', function(e) {
                const page = e.detail && e.detail.page;
                if (page && PAGE_COLORS[page]) {
                    applyPageColors(page);
                }
            });

            // ── Mobile: tap outside sidebar to close it ──────────────────
            // NOTE: the menuToggle click → sidebar.classList.toggle('open')
            // binding lives in app-core.js only. A duplicate toggle listener
            // used to live here too; having both meant every tap toggled
            // the class twice (open, then immediately closed again), so the
            // sidebar appeared to "never open" on mobile. Keep only the
            // outside-click-to-close behavior here.
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            if (menuToggle && sidebar) {
                document.addEventListener('click', function(e) {
                    if (window.innerWidth <= 768) {
                        if (sidebar.classList.contains('open') &&
                            !sidebar.contains(e.target) &&
                            !menuToggle.contains(e.target)) {
                            sidebar.classList.remove('open');
                        }
                    }
                });
            }

            // ── Ensure Invoices is loaded as the default page ────────────
            function ensureInvoicesDefault() {
                const invoicesNav = document.querySelector('.nav-item[data-page="invoices"]');
                if (invoicesNav) {
                    if (window.navigateTo) {
                        window.navigateTo('invoices');
                        return;
                    }
                    const currentPage = mainContent.dataset.activePage;
                    if (currentPage !== 'invoices') {
                        invoicesNav.click();
                    }
                    applyPageColors('invoices');
                }
            }

            setTimeout(ensureInvoicesDefault, 200);

            console.log('🎨 Page Color System ready – Invoices is the new default home (Dashboard removed)');
        })();
    </script>

</body>
</html>
