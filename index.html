<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111318" />
    <meta name="description" content="GenFin - Generator Sales & Service Business Management" />
    <title>GenFin - Business Manager</title>
    <!-- Chart.js CDN for enhanced reports & graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <!-- Google Identity Services & API Client for Drive Backup -->
    <script src="https://accounts.google.com/gsi/client">
    </script>
    <script src="https://apis.google.com/js/api.js">
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ── Root ──────────────────────────────────────────────────────── */
        :root {
            --primary: #5b5ef6;
            --primary-hover: #4a4de4;
            --primary-muted: rgba(91, 94, 246, 0.12);

            --sidebar-bg: #111318;
            --sidebar-border: rgba(255, 255, 255, 0.06);
            --sidebar-text: rgba(255, 255, 255, 0.55);
            --sidebar-text-hover: rgba(255, 255, 255, 0.92);
            --sidebar-active-bg: rgba(91, 94, 246, 0.15);
            --sidebar-active-text: #fff;
            --sidebar-hover-bg: rgba(255, 255, 255, 0.05);
            --sidebar-label: rgba(255, 255, 255, 0.28);
            --sidebar-accent: var(--primary);

            --bg: #f4f6fb;
            --card: #ffffff;
            --text: #0f172a;
            --text-secondary: #64748b;
            --border: #e8edf5;
            --border-strong: #d1d9e6;

            --success: #10b981;
            --success-bg: #ecfdf5;
            --success-text: #065f46;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --danger-text: #991b1b;
            --warning: #f59e0b;
            --warning-bg: #fffbeb;
            --warning-text: #92400e;

            --shadow-xs: 0 1px 2px rgba(15, 23, 42, 0.04);
            --shadow-sm: 0 1px 4px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.04);
            --shadow: 0 4px 12px rgba(15, 23, 42, 0.08), 0 1px 3px rgba(15, 23, 42, 0.05);
            --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.12), 0 4px 8px rgba(15, 23, 42, 0.06);

            --radius: 10px;
            --radius-sm: 7px;
            --radius-xs: 5px;
            --transition: 0.18s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Sidebar ───────────────────────────────────────────────────── */
        .sidebar {
            width: 248px;
            background: var(--sidebar-bg);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition);
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
        }
        .sidebar::-webkit-scrollbar {
            display: none;
        }

        .sidebar-header {
            padding: 24px 20px 20px;
            border-bottom: 1px solid var(--sidebar-border);
            margin-bottom: 6px;
            flex-shrink: 0;
        }
        .sidebar-header .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .logo-icon svg {
            width: 17px;
            height: 17px;
            color: #fff;
        }
        .sidebar-header .subtitle {
            font-size: 0.7rem;
            color: var(--sidebar-label);
            letter-spacing: 0.4px;
            margin-top: 3px;
            margin-left: 42px;
            font-weight: 500;
        }

        .nav-section {
            padding: 2px 0;
        }
        .nav-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
            color: var(--sidebar-label);
            padding: 14px 20px 5px;
        }

        /* ── Nav item base ────────────────────────────────────────────── */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px 9px 20px;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.855rem;
            color: var(--sidebar-text);
            user-select: none;
            font-weight: 500;
            position: relative;
            margin: 1px 10px 1px 0;
            border-radius: 0 8px 8px 0;
            letter-spacing: -0.1px;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            border-radius: 0 3px 3px 0;
            transition: height var(--transition), background var(--transition);
        }
        .nav-item svg {
            width: 17px;
            height: 17px;
            flex-shrink: 0;
            opacity: 0.6;
            transition: opacity var(--transition);
        }
        .nav-item:hover {
            background: var(--sidebar-hover-bg);
            color: var(--sidebar-text-hover);
        }
        .nav-item:hover svg {
            opacity: 0.9;
        }
        .nav-item:hover::before {
            height: 60%;
        }

        /* ── Nav item ACTIVE – unique colors applied via JS ──────────── */
        .nav-item.active {
            color: #fff;
            font-weight: 600;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
        }
        .nav-item.active svg {
            opacity: 1;
        }
        .nav-item.active::before {
            height: 70%;
            background: #fff !important;
        }

        /* ── Sidebar footer ───────────────────────────────────────────── */
        .sidebar-footer {
            margin-top: auto;
            padding: 14px 20px;
            border-top: 1px solid var(--sidebar-border);
            font-size: 0.72rem;
            color: var(--sidebar-label);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #10b981;
            flex-shrink: 0;
        }
        .status-dot.offline {
            background: #ef4444;
        }

        /* ── Main content ─────────────────────────────────────────────── */
        .main-content {
            flex: 1;
            margin-left: 248px;
            padding: 28px 36px;
            min-height: 100vh;
            transition: margin var(--transition);
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        /* ── Buttons ───────────────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.84rem;
            font-weight: 600;
            transition: all var(--transition);
            white-space: nowrap;
            background: #ffffff;
            border: 1px solid var(--border-strong);
            color: #374151;
            font-family: inherit;
            letter-spacing: -0.1px;
        }
        .btn:hover {
            box-shadow: var(--shadow-sm);
            border-color: #c2cfe0;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: transparent;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 14px rgba(91, 94, 246, 0.35);
            border-color: transparent;
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #374151;
            border-color: #e2e8f0;
        }
        .btn-secondary:hover {
            background: #e8eef7;
        }
        .btn-danger {
            background: var(--danger-bg);
            color: var(--danger-text);
            border-color: #fecaca;
        }
        .btn-danger:hover {
            background: #fee2e2;
        }
        .btn-success {
            background: var(--success-bg);
            color: var(--success-text);
            border-color: #a7f3d0;
        }
        .btn-warning {
            background: var(--warning-bg);
            color: var(--warning-text);
            border-color: #fde68a;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.78rem;
            border-radius: var(--radius-xs);
        }
        .btn-xs {
            padding: 4px 8px;
            font-size: 0.7rem;
            border-radius: 4px;
        }

        /* ── Cards ─────────────────────────────────────────────────────── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-xs);
            border: 1px solid var(--border);
            padding: 22px;
            margin-bottom: 18px;
        }
        .stat-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-xs);
            border: 1px solid var(--border);
            padding: 18px 20px;
            transition: box-shadow var(--transition), transform var(--transition);
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        .stat-value {
            font-size: 1.85rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 3px;
            letter-spacing: -1px;
        }
        .stat-label {
            font-size: 0.72rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            font-weight: 600;
        }

        /* ── Tables ────────────────────────────────────────────────────── */
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.855rem;
        }
        th {
            padding: 11px 14px;
            text-align: left;
            font-weight: 600;
            color: #fff;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            border-bottom: none;
            white-space: nowrap;
            /* background set by JS per page */;
        }
        td {
            padding: 11px 14px;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text);
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: #f8faff;
        }

        /* ── Badges ────────────────────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .badge-paid {
            background: var(--success-bg);
            color: var(--success-text);
        }
        .badge-pending {
            background: var(--warning-bg);
            color: var(--warning-text);
        }
        .badge-overdue {
            background: var(--danger-bg);
            color: var(--danger-text);
        }

        /* ── Modals ────────────────────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal {
            background: #fff;
            border-radius: 14px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 760px;
            max-height: 88vh;
            overflow-y: auto;
            padding: 28px;
            position: relative;
            border: 1px solid var(--border);
        }
        .modal h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 18px;
            background: #f1f5f9;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: #64748b;
            padding: 5px 9px;
            border-radius: var(--radius-xs);
            line-height: 1;
            transition: all var(--transition);
        }
        .modal-close:hover {
            background: #e2e8f0;
            color: var(--text);
        }

        /* ── Forms ─────────────────────────────────────────────────────── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .form-grid.span-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group.full {
            grid-column: 1 / -1;
        }
        .form-group label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 9px 11px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-family: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
            background: #fff;
            color: var(--text);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(91, 94, 246, 0.12);
        }

        /* ── Toasts ────────────────────────────────────────────────────── */
        .toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 11px 16px;
            border-radius: 9px;
            color: #fff;
            font-weight: 600;
            font-size: 0.83rem;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 360px;
        }
        .toast-success {
            background: #059669;
        }
        .toast-error {
            background: #dc2626;
        }
        .toast-info {
            background: var(--primary);
        }
        @keyframes slideIn {
            from {
                transform: translateX(110%) scale(0.92);
                opacity: 0;
            }
            to {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }

        /* ── Mobile toggle ────────────────────────────────────────────── */
        .menu-toggle {
            display: none;
            background: var(--sidebar-bg);
            color: #fff;
            border: none;
            font-size: 1.2rem;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 300;
            box-shadow: var(--shadow);
        }

        /* ── Misc ──────────────────────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 48px;
            color: #94a3b8;
        }
        .chart-container {
            margin: 18px 0;
            max-height: 340px;
        }

        /* ── Responsive ────────────────────────────────────────────────── */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 20px 16px;
                padding-top: 58px;
            }
            .menu-toggle {
                display: block;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-grid.span-3 {
                grid-template-columns: 1fr;
            }
            .stat-row {
                grid-template-columns: 1fr 1fr;
            }
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .modal {
                max-width: 95vw;
                padding: 20px;
            }
        }

        /* ── Print ─────────────────────────────────────────────────────── */
        @media print {
            body {
                background: #fff;
            }
            .sidebar,
            .menu-toggle,
            .page-header button,
            .btn,
            .modal-overlay,
            .toast-container,
            .nav-section,
            .sidebar-footer,
            .no-print {
                display: none !important;
            }
            .main-content {
                margin-left: 0 !important;
                padding: 0 !important;
            }
            .card {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }
            table {
                font-size: 0.75rem;
            }
            @page {
                margin: 0.5cm;
                size: A4;
            }
        }
        .print-area {
            display: none;
        }
        @media print {
            .print-area {
                display: block;
            }
        }

        /* ── Page color overrides for table headers (set by JS) ────── */
        .table-wrap th {
            transition: background 0.25s ease, color 0.25s ease;
        }
    </style>
</head>
<body>

    <button class="menu-toggle" id="menuToggle" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
    </button>

    <!-- ─── Sidebar ─────────────────────────────────────────────────────── -->

    <script src="app-core.js">

    <!-- ─── Page Color System ───────────────────────────────────────────── -->
    <script>
        (function() {
            'use strict';

            // ── Color palette for each page ──────────────────────────────
            const PAGE_COLORS = {
                'invoices': {
                    primary: '#10B981',
                    dark: '#059669',
                    light: 'rgba(16,185,129,0.22)'
                },
                'purchase-orders': {
                    primary: '#F59E0B',
                    dark: '#D97706',
                    light: 'rgba(245,158,11,0.22)'
                },
                'expenses': {
                    primary: '#EF4444',
                    dark: '#DC2626',
                    light: 'rgba(239,68,68,0.22)'
                },
                'customers': {
                    primary: '#8B5CF6',
                    dark: '#7C3AED',
                    light: 'rgba(139,92,246,0.22)'
                },
                'suppliers': {
                    primary: '#14B8A6',
                    dark: '#0D9488',
                    light: 'rgba(20,184,166,0.22)'
                },
                'products': {
                    primary: '#6366F1',
                    dark: '#4F46E5',
                    light: 'rgba(99,102,241,0.22)'
                },
                'service-warranty': {
                    primary: '#EC4899',
                    dark: '#DB2777',
                    light: 'rgba(236,72,153,0.22)'
                },
                'reports': {
                    primary: '#06B6D4',
                    dark: '#0891B2',
                    light: 'rgba(6,182,212,0.22)'
                },
                'profile': {
                    primary: '#F59E0B',
                    dark: '#D97706',
                    light: 'rgba(245,158,11,0.22)'
                },
                'settings': {
                    primary: '#64748B',
                    dark: '#475569',
                    light: 'rgba(100,116,139,0.22)'
                }
            };

            // ── DOM refs ──────────────────────────────────────────────────
            const navItems = document.querySelectorAll('.nav-item');
            const mainContent = document.getElementById('mainContent');

            // ── Apply page colors ────────────────────────────────────────
            function applyPageColors(page) {
                const colors = PAGE_COLORS[page];
                if (!colors) return;

                // 1. Update nav items: remove active, then set on target
                navItems.forEach(el => {
                    el.classList.remove('active');
                    el.style.background = 'transparent';
                });

                const activeNav = document.querySelector(`.nav-item[data-page="${page}"]`);
                if (activeNav) {
                    activeNav.classList.add('active');
                    activeNav.style.background = colors.light;
                    activeNav.style.boxShadow = `inset 0 0 0 1px ${colors.primary}40, 0 0 20px ${colors.primary}15`;
                }

                // 2. Style all table headers inside the main content
                const allTh = mainContent.querySelectorAll('.table-wrap th');
                allTh.forEach(th => {
                    th.style.background = colors.dark;
                    th.style.color = '#fff';
                    th.style.borderBottom = 'none';
                });

                // 3. Also style any thead > tr > th directly (fallback)
                const theadTh = mainContent.querySelectorAll('thead th');
                theadTh.forEach(th => {
                    th.style.background = colors.dark;
                    th.style.color = '#fff';
                    th.style.borderBottom = 'none';
                });

                // 4. Store current page on main content for CSS hooks
                mainContent.dataset.activePage = page;
            }

            // ── Nav click handler ────────────────────────────────────────
            navItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    const page = this.dataset.page;
                    if (!page) return;

                    requestAnimationFrame(() => {
                        setTimeout(() => {
                            applyPageColors(page);
                        }, 20);
                    });
                });
            });

            // ── MutationObserver: re-apply colors when content changes ──
            const observer = new MutationObserver(() => {
                const currentPage = mainContent.dataset.activePage || 'invoices';
                if (currentPage && PAGE_COLORS[currentPage]) {
                    applyPageColors(currentPage);
                } else {
                    const active = document.querySelector('.nav-item.active');
                    if (active) {
                        const page = active.dataset.page;
                        if (page && PAGE_COLORS[page]) {
                            applyPageColors(page);
                        }
                    }
                }
            });

            observer.observe(mainContent, {
                childList: true,
                subtree: true,
                attributes: false,
            });

            // ── Also watch for table addition ─────────────────────────────
            const tableObserver = new MutationObserver(() => {
                const currentPage = mainContent.dataset.activePage || 'invoices';
                if (currentPage && PAGE_COLORS[currentPage]) {
                    const ths = mainContent.querySelectorAll('.table-wrap th, thead th');
                    if (ths.length > 0) {
                        const colors = PAGE_COLORS[currentPage];
                        ths.forEach(th => {
                            th.style.background = colors.dark;
                            th.style.color = '#fff';
                            th.style.borderBottom = 'none';
                        });
                    }
                }
            });

            tableObserver.observe(mainContent, {
                childList: true,
                subtree: true,
                attributes: false,
            });

            // ── Initial load: apply colors for the active page ──────────
            function initColors() {
                const active = document.querySelector('.nav-item.active');
                if (active) {
                    const page = active.dataset.page;
                    if (page && PAGE_COLORS[page]) {
                        applyPageColors(page);
                        return;
                    }
                }
                // fallback: Invoices (Dashboard removed)
                applyPageColors('invoices');
            }

            if (document.readyState === 'complete') {
                initColors();
            } else {
                window.addEventListener('load', () => {
                    setTimeout(initColors, 150);
                });
            }

            // ── Expose so app-core.js can call us ────────────────────────
            window.__applyPageColors = applyPageColors;

            // ── Listen for pageChange events ─────────────────────────────
            document.addEventListener('pageChange', function(e) {
                const page = e.detail && e.detail.page;
                if (page && PAGE_COLORS[page]) {
                    applyPageColors(page);
                }
            });

            // ── Mobile menu toggle ───────────────────────────────────────
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            if (menuToggle && sidebar) {
                menuToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('open');
                });
                document.addEventListener('click', function(e) {
                    if (window.innerWidth <= 768) {
                        if (!sidebar.contains(e.target) && e.target !== menuToggle && !menuToggle.contains(e
                            .target)) {
                            sidebar.classList.remove('open');
                        }
                    }
                });
            }

            // ── Ensure Invoices is loaded as the default page ────────────
            // If app-core.js exposes a navigate() or similar, we call it.
            // Otherwise we simulate a click on the Invoices nav item.
            function ensureInvoicesDefault() {
                const invoicesNav = document.querySelector('.nav-item[data-page="invoices"]');
                if (invoicesNav) {
                    // If app-core.js uses a custom event or global, try that first
                    if (window.__navigateTo) {
                        window.__navigateTo('invoices');
                        return;
                    }
                    // If app-core.js listens for nav clicks, trigger one
                    // but only if the page isn't already loaded
                    const currentPage = mainContent.dataset.activePage;
                    if (currentPage !== 'invoices') {
                        invoicesNav.click();
                    }
                    // Ensure colors are applied
                    applyPageColors('invoices');
                }
            }

            // Run after app-core.js has had a chance to render
            setTimeout(ensureInvoicesDefault, 200);

            console.log('🎨 Page Color System ready – Invoices is the new default home (Dashboard removed)');
        })();
    </script>

</body>
